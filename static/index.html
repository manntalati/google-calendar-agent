<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Calendar Assistant</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #4a9eff;
    --accent-dim: #1a3a5c;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header .status {
    font-size: 12px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header .status::before {
    content: '';
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
  }

  /* Quick actions */
  .quick-actions {
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .quick-actions::-webkit-scrollbar { display: none; }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .quick-btn:active { background: var(--accent-dim); border-color: var(--accent); }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: 88%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.5;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.bot.error {
    border-color: var(--red);
    background: #1a0f0f;
  }
  .msg.bot.conflict {
    border-color: var(--yellow);
    background: #1a1708;
  }

  /* Event cards inside messages */
  .event-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-top: 8px;
    font-size: 14px;
  }
  .event-card .ev-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 6px;
  }
  .event-card .ev-row {
    display: flex;
    gap: 8px;
    padding: 3px 0;
    color: var(--text-dim);
  }
  .event-card .ev-row .label {
    min-width: 70px;
    color: var(--text-dim);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .event-card .ev-row .value {
    color: var(--text);
  }

  /* Event list items */
  .event-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }
  .event-list-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 12px;
    border-left: 3px solid var(--accent);
  }
  .event-list-item .eli-title {
    font-weight: 500;
    font-size: 14px;
  }
  .event-list-item .eli-time {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .event-list-item .eli-loc {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Free slots */
  .free-slot {
    background: var(--surface2);
    border-radius: 10px;
    padding: 8px 12px;
    border-left: 3px solid var(--green);
    font-size: 13px;
  }

  /* Success badge */
  .success-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #0d2818;
    border: 1px solid #1a4d2e;
    color: var(--green);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
  }

  /* Conflict actions */
  .conflict-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .conflict-btn {
    padding: 8px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .conflict-btn:active { background: var(--accent-dim); }
  .conflict-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }

  /* Loading */
  .loading {
    display: flex;
    gap: 4px;
    padding: 16px;
    align-self: flex-start;
  }
  .loading span {
    width: 8px;
    height: 8px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-row textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.15s;
  }
  .input-row textarea:focus { border-color: var(--accent); }
  .input-row textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn:active:not(:disabled) { transform: scale(0.92); }
  .send-btn svg { width: 20px; height: 20px; fill: white; }

  /* Link */
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Welcome */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
  }
  .welcome h2 {
    color: var(--text);
    font-size: 22px;
    font-weight: 600;
  }
  .welcome p { font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <h1>Calendar Assistant</h1>
  <div class="status">Connected</div>
</div>

<div class="quick-actions">
  <button class="quick-btn" onclick="sendQuick('What do I have today?')">Today</button>
  <button class="quick-btn" onclick="sendQuick('What do I have tomorrow?')">Tomorrow</button>
  <button class="quick-btn" onclick="sendQuick('Show me this week')">This Week</button>
  <button class="quick-btn" onclick="sendQuick('What is my next event?')">Next Event</button>
  <button class="quick-btn" onclick="sendQuick('When am I free tomorrow?')">Free Slots</button>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <h2>What's on your calendar?</h2>
    <p>Type a command like "Team meeting tomorrow at 2pm" or tap a quick action above.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Add an event, check your schedule..."
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const welcomeEl = document.getElementById('welcome');

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim();
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (inputEl.value.trim()) send();
  }
}

function scrollBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function addMsg(html, cls) {
  if (welcomeEl) welcomeEl.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerHTML = html;
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function showLoading() {
  const div = document.createElement('div');
  div.className = 'loading';
  div.id = 'loading';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  scrollBottom();
}
function hideLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

function sendQuick(text) {
  inputEl.value = text;
  send();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true
    });
  } catch { return iso; }
}

function fmtTimeShort(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  } catch { return iso; }
}

function renderEventCard(args) {
  let rows = '';
  if (args.start_str) {
    let when = fmtTime(args.start_str);
    if (args.end_str) when += ' - ' + fmtTimeShort(args.end_str);
    if (args.all_day) when = fmtTime(args.start_str).split(',').slice(0,2).join(',') + ' (all day)';
    rows += `<div class="ev-row"><span class="label">When</span><span class="value">${escHtml(when)}</span></div>`;
  }
  if (args.location) rows += `<div class="ev-row"><span class="label">Where</span><span class="value">${escHtml(args.location)}</span></div>`;
  if (args.attendees && args.attendees.length) rows += `<div class="ev-row"><span class="label">With</span><span class="value">${escHtml(args.attendees.join(', '))}</span></div>`;
  if (args.recurrence && args.recurrence.length) rows += `<div class="ev-row"><span class="label">Repeats</span><span class="value">${escHtml(args.recurrence.join(', '))}</span></div>`;
  if (args.add_video_call) rows += `<div class="ev-row"><span class="label">Video</span><span class="value">Google Meet</span></div>`;
  return `<div class="event-card"><div class="ev-title">${escHtml(args.summary || '(untitled)')}</div>${rows}</div>`;
}

function renderResult(tool, result, args, calName) {
  // Success create/update/delete
  if (result.success === true) {
    let html = '';
    if (tool === 'create_new_event') {
      html = `<span class="success-badge">Event created</span>`;
      html += renderEventCard(args);
      if (result.link) html += `<div style="margin-top:8px;font-size:13px"><a href="${result.link}" target="_blank">Open in Google Calendar</a></div>`;
      if (result.meetLink) html += `<div style="font-size:13px"><a href="${result.meetLink}" target="_blank">Join Google Meet</a></div>`;
    } else if (tool === 'update_event') {
      html = `<span class="success-badge">Event updated</span>`;
      if (result.updated_summary) html += `<div style="margin-top:6px">${escHtml(result.updated_summary)}</div>`;
      if (result.link) html += `<div style="margin-top:4px;font-size:13px"><a href="${result.link}" target="_blank">Open in Calendar</a></div>`;
    } else if (tool === 'delete_event') {
      html = `<span class="success-badge">Event deleted</span>`;
      if (result.deleted) html += `<div style="margin-top:6px">${escHtml(result.deleted)}</div>`;
    }
    return html;
  }

  // List events
  if (tool === 'list_events' && result.success && result.events) {
    if (!result.events.length) return 'No events found.';
    let html = `<div style="font-size:14px;color:var(--text-dim);margin-bottom:4px">${result.events.length} event(s)</div><div class="event-list">`;
    for (const ev of result.events) {
      const loc = ev.location ? `<div class="eli-loc">${escHtml(ev.location)}</div>` : '';
      html += `<div class="event-list-item">
        <div class="eli-title">${escHtml(ev.summary)}</div>
        <div class="eli-time">${fmtTime(ev.start)} - ${fmtTimeShort(ev.end)}</div>
        ${loc}
      </div>`;
    }
    html += '</div>';
    return html;
  }

  // Free slots
  if (tool === 'find_free_slots' && result.success) {
    if (!result.free_slots || !result.free_slots.length) return 'No free slots found.';
    let html = `<div style="font-size:14px;margin-bottom:6px">${result.free_slots.length} free slot(s)</div><div class="event-list">`;
    for (const s of result.free_slots.slice(0, 8)) {
      html += `<div class="free-slot">${fmtTime(s.start)} - ${fmtTimeShort(s.end)} (${s.duration_minutes} min)</div>`;
    }
    html += '</div>';
    return html;
  }

  // Suggest next free slot
  if (tool === 'suggest_next_free_slot' && result.success && result.suggested_slot) {
    const s = result.suggested_slot;
    return `<div>Next free slot:</div><div class="free-slot" style="margin-top:6px">${fmtTime(s.start)} (${s.duration_minutes} min available)</div>`;
  }

  // Get next event
  if (tool === 'get_next_event' && result && result.summary) {
    return `<div style="font-size:14px;color:var(--text-dim);margin-bottom:4px">Next event</div>
      <div class="event-list-item">
        <div class="eli-title">${escHtml(result.summary)}</div>
        <div class="eli-time">${fmtTime(result.start)}</div>
        <div class="eli-loc">${escHtml(result.calendar || '')}</div>
      </div>`;
  }

  // Error
  if (result.success === false) {
    return `<div style="color:var(--red)">${escHtml(result.error || 'Something went wrong.')}</div>`;
  }

  // Fallback
  return `<pre style="font-size:13px;white-space:pre-wrap">${escHtml(JSON.stringify(result, null, 2))}</pre>`;
}

let busy = false;

async function send() {
  if (busy) return;
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  busy = true;

  addMsg(escHtml(text), 'user');
  showLoading();

  try {
    const res = await fetch('/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: text })
    });
    const data = await res.json();
    hideLoading();

    if (data.status === 'error') {
      addMsg(escHtml(data.message || 'Something went wrong.'), 'bot error');
    } else if (data.status === 'conflict') {
      const conflict = data.result.conflict || {};
      let html = `<div style="margin-bottom:8px">Conflict with <strong>${escHtml(conflict.summary || '?')}</strong></div>`;
      html += `<div style="font-size:13px;color:var(--text-dim)">${fmtTime(conflict.start)} - ${fmtTimeShort(conflict.end)}</div>`;
      if (data.suggested_slot) {
        html += `<div style="margin-top:8px;font-size:13px">Suggested: <strong>${fmtTime(data.suggested_slot.start)}</strong></div>`;
      }
      html += `<div class="conflict-actions">
        <button class="conflict-btn primary" onclick="resolveConflict('force', this)">Create Anyway</button>
        ${data.suggested_slot ? `<button class="conflict-btn" onclick="resolveConflict('suggest', this)">Use Suggested</button>` : ''}
      </div>`;

      const msgEl = addMsg(html, 'bot conflict');
      // Store context on the element
      msgEl._conflictData = data;
    } else {
      const html = renderResult(data.tool, data.result, data.args || {}, data.calendar_name);
      addMsg(html, 'bot');
    }
  } catch (e) {
    hideLoading();
    addMsg('Could not reach server. Is it running?', 'bot error');
  }

  busy = false;
}

async function resolveConflict(action, btn) {
  // Find parent msg
  const msgEl = btn.closest('.msg');
  const data = msgEl._conflictData;
  if (!data) return;

  // Remove action buttons
  const actionsEl = msgEl.querySelector('.conflict-actions');
  if (actionsEl) actionsEl.remove();

  showLoading();
  let body;
  if (action === 'force') {
    body = { command: data.args.summary + ' at ' + data.args.start_str, ignore_conflict: true };
  } else if (action === 'suggest' && data.suggested_slot) {
    // Reconstruct command with suggested time
    body = { command: data.args.summary + ' at ' + data.suggested_slot.start, ignore_conflict: true };
  }

  try {
    const res = await fetch('/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const newData = await res.json();
    hideLoading();
    const html = renderResult(newData.tool, newData.result, newData.args || {}, newData.calendar_name);
    addMsg(html, 'bot');
  } catch (e) {
    hideLoading();
    addMsg('Failed to resolve conflict.', 'bot error');
  }
}

// Focus input on load
inputEl.focus();
</script>
</body>
</html>
